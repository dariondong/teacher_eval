<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}教学评价系统{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e8eaf6 0%, #f5f5f5 100%);
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 1100px; margin: 0 auto; padding: 20px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            overflow: hidden; animation: fadeIn 0.5s ease-out;
        }
        .card-header {
            background: linear-gradient(135deg, #4a90e2, #357abd);
            color: white; padding: 30px; text-align: center;
        }
        .card-header h1 { font-size: 28px; margin-bottom: 8px; }
        .card-header p { font-size: 14px; opacity: 0.85; line-height: 1.8; }
        .card-body { padding: 30px; }
        .btn {
            display: inline-block; padding: 10px 24px; border: none; border-radius: 8px;
            font-size: 15px; cursor: pointer; text-decoration: none; transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
        .btn-danger {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
        }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(244,67,54,0.4); }
        .btn-sm { padding: 6px 14px; font-size: 13px; }
        .flash-msg {
            padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; text-align: center;
            animation: fadeIn 0.3s;
        }
        .flash-success { background: #c8e6c9; color: #2e7d32; }
        .flash-error { background: #ffcdd2; color: #c62828; }
        .footer {
            text-align: center; padding: 20px; color: #999; font-size: 13px; margin-top: 20px;
        }
        .footer b { color: #666; }
        .table {
            width: 100%; border-collapse: collapse; margin: 15px 0;
        }
        .table th, .table td {
            padding: 10px 12px; text-align: left; border-bottom: 1px solid #e0e0e0;
        }
        .table th { background: #f5f7fa; font-weight: 600; color: #555; }
        .table tr:hover { background: #f8f9ff; }
        .pagination {
            display: flex; gap: 8px; justify-content: center; margin: 20px 0; align-items: center;
        }
        .pagination a, .pagination span {
            padding: 6px 14px; border-radius: 6px; text-decoration: none; color: #4a90e2;
            background: #f0f4ff; transition: all 0.2s;
        }
        .pagination a:hover { background: #4a90e2; color: white; }
        .pagination .current { background: #4a90e2; color: white; }
        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px;
        }
        .badge-blue { background: #e3f2fd; color: #1565c0; }
        .stat-card {
            background: white; border-radius: 12px; padding: 20px; text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06); flex: 1; min-width: 150px;
        }
        .stat-card .num { font-size: 32px; font-weight: bold; color: #4a90e2; margin: 8px 0; }
        .stat-card .label { font-size: 14px; color: #888; }
        .filter-bar {
            display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 20px;
        }
        .filter-bar select, .filter-bar input {
            padding: 8px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
        }
        .filter-bar select:focus, .filter-bar input:focus { outline: none; border-color: #4a90e2; }
        @media (max-width: 768px) {
            .card-body { padding: 15px; }
            .stat-card { min-width: 120px; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
        <div class="footer">
            &nbsp;
        </div>
    </div>
    {% block extra_js %}{% endblock %}
</body>
</html>
