<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统设置</title>
<style>
:root {
  --black: #1a1a1a;
  --dark: #2d2d2d;
  --gray-700: #666;
  --gray-500: #999;
  --gray-300: #ccc;
  --gray-100: #e8e8e8;
  --gray-50: #f5f5f5;
  --white: #fff;
  --border: #d4d4d4;
  --border-light: #eaeaea;
  --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font); background: var(--gray-50); padding: 24px; color: var(--dark); }
.container { max-width: 600px; margin: 0 auto; }

.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
}
.top-bar h2 { font-size: 20px; font-weight: 600; color: var(--black); letter-spacing: 2px; }
.top-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 8px 18px; border: 1px solid var(--border);
  font-size: 13px; font-weight: 500; font-family: inherit;
  cursor: pointer; text-decoration: none; transition: all 0.2s;
  background: var(--white); color: var(--dark); letter-spacing: 0.5px;
}
.btn:hover { border-color: var(--black); }
.btn-black { background: var(--black); color: var(--white); border-color: var(--black); }
.btn-black:hover { background: var(--dark); }

.card { background: var(--white); border: 1px solid var(--border-light); margin-bottom: 20px; }
.card-body { padding: 36px 32px; }

.form-group { margin-bottom: 24px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-700); margin-bottom: 8px; letter-spacing: 1px; }
.form-group input {
  width: 100%; padding: 11px 16px; border: 1px solid var(--border);
  font-size: 15px; font-family: inherit; transition: all 0.2s;
}
.form-group input:focus { outline: none; border-color: var(--black); }
.form-hint { font-size: 12px; color: var(--gray-500); margin-top: 6px; }

.flash-msg { padding: 10px 20px; margin-bottom: 20px; text-align: center; font-size: 13px; border: 1px solid; }
.flash-success { background: var(--gray-50); color: var(--gray-900); border-color: var(--gray-300); }
.flash-error { background: var(--gray-50); color: var(--black); border-color: var(--black); }

.footer { text-align: center; padding: 20px; color: var(--gray-500); font-size: 12px; }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h2>系统设置</h2>
    <div class="top-actions">
      <a href="{{ url_for('admin_dashboard') }}" class="btn">← 面板</a>
    </div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}{% for c, m in messages %}<div class="flash-msg flash-{{ c }}">{{ m }}</div>{% endfor %}{% endif %}
  {% endwith %}

  <div class="card"><div class="card-body">
    <form method="post">
      <div class="form-group">
        <label>学校名称</label>
        <input type="text" name="school_name" value="{{ school_name }}" required maxlength="100">
        <div class="form-hint">将在问卷页面标题和页脚显示</div>
      </div>
      <button type="submit" class="btn btn-black">保存设置</button>
    </form>
  </div></div>

  <div class="footer">&nbsp;</div>
</div>
</body>
</html>
