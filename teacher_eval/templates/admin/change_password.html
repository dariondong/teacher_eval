<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修改密码</title>
<style>
:root {
  --black: #1a1a1a;
  --dark: #2d2d2d;
  --gray-700: #666;
  --gray-500: #999;
  --gray-300: #ccc;
  --gray-100: #e8e8e8;
  --gray-50: #f5f5f5;
  --white: #fff;
  --border: #d4d4d4;
  --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font);
  background: var(--gray-50);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  color: var(--dark);
}
.card {
  max-width: 420px; width: 100%;
  background: var(--white);
  border: 1px solid var(--border);
  box-shadow: 0 8px 40px rgba(0,0,0,0.05);
  animation: pop 0.5s ease-out;
}
@keyframes pop { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
.card-header {
  background: var(--black);
  color: var(--white);
  padding: 36px 32px 28px;
  text-align: center;
}
.card-header h1 { font-size: 18px; font-weight: 600; letter-spacing: 4px; }
.card-body { padding: 32px; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-700); margin-bottom: 6px; letter-spacing: 1px; }
.form-group input {
  width: 100%; padding: 11px 16px;
  border: 1px solid var(--border); font-size: 15px; font-family: inherit;
  transition: all 0.2s; background: var(--white); color: var(--dark);
}
.form-group input:focus { outline: none; border-color: var(--black); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
.btn {
  width: 100%; padding: 13px;
  background: var(--black); color: var(--white);
  border: none; font-size: 14px; font-weight: 500; font-family: inherit;
  cursor: pointer; letter-spacing: 3px; transition: all 0.3s;
}
.btn:hover { background: var(--dark); }
.flash-msg { padding: 10px 16px; margin-bottom: 20px; text-align: center; font-size: 13px; border: 1px solid; }
.flash-success { background: var(--gray-50); color: var(--gray-900); border-color: var(--gray-300); }
.flash-error { background: var(--gray-50); color: var(--black); border-color: var(--black); }
.back-link { display: block; text-align: center; margin-top: 20px; color: var(--gray-500); text-decoration: none; font-size: 13px; }
.back-link:hover { color: var(--black); }
</style>
</head>
<body>
<div class="card">
  <div class="card-header"><h1>修改密码</h1></div>
  <div class="card-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for c, m in messages %}<div class="flash-msg flash-{{ c }}">{{ m }}</div>{% endfor %}{% endif %}
    {% endwith %}
    <form method="post">
      <div class="form-group"><label>原密码</label><input type="password" name="old_password" required placeholder="输入原密码"></div>
      <div class="form-group"><label>新密码</label><input type="password" name="new_password" required placeholder="至少4位" minlength="4"></div>
      <div class="form-group"><label>确认新密码</label><input type="password" name="confirm_password" required placeholder="再次输入新密码"></div>
      <button type="submit" class="btn">保存修改</button>
    </form>
    <a href="{{ url_for('admin_dashboard') }}" class="back-link">← 返回面板</a>
  </div>
</div>
</body>
</html>
